name: MassivSelf
options:
  bundleIdPrefix: com.ixebit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  MassivSelf:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MassivSelf
    dependencies:
      - sdk: SwiftData.framework
      - sdk: UserNotifications.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ixebit.massivself
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "MassivSelf möchte dir tägliche Erinnerungen senden, damit du an deiner 30-Tage-Reise dranbleibst."
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
